# Render Web Service (free tier). Background Workers are not free.
services:
  - type: web
    name: rhythm-syndicate-tourney-bot
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: python bot/main.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      # Set in Render dashboard (secrets), not in git:
      # DISCORD_TOKEN
      # RS_GUILD_ID
      # RS_CHANNEL_ID
      # RS_ADMIN_ROLE_IDS
