<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RS Visual Editor</title>
  <style>
    /* ===== App chrome (editor UI) ===== */
    :root {
      --bg: #0b0c0e;
      --panel: #14181e;
      --border: #2a3038;
      --text: #f4f6f8;
      --muted: #8b949e;
      --red: #e10600;
      --input: #1a1f26;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: #10141a;
    }
    header img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
    header h1 {
      font-size: 15px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
    }
    header p { font-size: 12px; color: var(--muted); margin-top: 2px; }
    header .spacer { flex: 1; }
    header .hint {
      font-size: 12px;
      color: var(--muted);
      max-width: 280px;
      text-align: right;
    }
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      flex: 1;
      min-height: 0;
    }
    aside {
      border-right: 1px solid var(--border);
      background: var(--panel);
      padding: 16px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    main {
      padding: 24px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(225,6,0,0.08), transparent 55%),
        var(--bg);
      -webkit-overflow-scrolling: touch;
    }
    .preview-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 8px;
    }
    #exportRoot {
      transform-origin: top center;
    }
    .sticky-actions {
      display: none;
    }
    /* —— Phone / tablet —— */
    @media (max-width: 900px) {
      header {
        padding: 12px 14px;
        gap: 10px;
        flex-wrap: wrap;
      }
      header .hint { display: none; }
      header h1 { font-size: 13px; }
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }
      /* Preview first on phone so they see the card */
      main {
        order: -1;
        padding: 12px 10px 100px;
        max-height: 42vh;
      }
      aside {
        border-right: none;
        border-top: 1px solid var(--border);
        padding: 12px 14px 120px;
      }
      .sticky-actions {
        display: flex;
        position: fixed;
        left: 0; right: 0; bottom: 0;
        gap: 8px;
        padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
        background: rgba(16, 20, 26, 0.96);
        border-top: 1px solid var(--border);
        z-index: 50;
        backdrop-filter: blur(8px);
      }
      .sticky-actions button {
        flex: 1;
        border: none;
        border-radius: 8px;
        padding: 14px 10px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      aside .actions { display: none; }
      .tabs button {
        min-height: 40px;
        padding: 10px 12px;
        font-size: 13px;
      }
    }
    label.field {
      display: block;
      margin-bottom: 12px;
    }
    label.field span {
      display: block;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input, textarea, select {
      width: 100%;
      background: var(--input);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 11px 12px;
      font-size: 16px; /* 16px avoids iOS zoom-on-focus */
      font-family: inherit;
      touch-action: manipulation;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: rgba(225,6,0,0.55);
    }
    textarea { min-height: 72px; resize: vertical; }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }
    .tabs button {
      background: #1a1f26;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 0.04em;
    }
    .tabs button.active {
      color: #ff8a84;
      border-color: rgba(225,6,0,0.5);
      background: rgba(225,6,0,0.12);
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .actions button {
      border: none;
      border-radius: 6px;
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(180deg, #e10600, #9b0b0b);
      color: white;
    }
    .btn-secondary {
      background: #1e232b;
      color: var(--steel, #c5ccd4);
      border: 1px solid var(--border);
    }
    .btn-primary:disabled { opacity: 0.5; cursor: wait; }
    .preview-label {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .note {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.45;
      margin-top: 10px;
    }

    /* ===== Card styles (from announcement mockups) ===== */
    :root {
      --rs-red: #e10600;
      --rs-red-deep: #9b0b0b;
      --rs-red-glow: rgba(225, 6, 0, 0.45);
      --rs-steel: #c5ccd4;
      --rs-steel-dim: #8b949e;
      --rs-card: #121417;
      --rs-card-2: #181b20;
      --rs-border: #2a2f36;
      --rs-white: #f4f6f8;
    }
    .chip {
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 10px;
      border-radius: 999px;
      background: #1e232b;
      border: 1px solid var(--rs-border);
      color: var(--rs-steel);
      display: inline-block;
    }
    .chip.hot {
      border-color: rgba(225,6,0,0.55);
      color: #ff6b63;
      background: rgba(225,6,0,0.12);
    }

    .m1 {
      width: 720px;
      background: var(--rs-card);
      border-radius: 8px;
      border-left: 5px solid var(--rs-red);
      padding: 18px 20px 16px;
      display: grid;
      grid-template-columns: 1fr 88px;
      gap: 12px 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.55);
    }
    .m1 .eyebrow {
      grid-column: 1 / -1;
      color: var(--rs-steel-dim);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .m1 h2 { font-size: 22px; font-weight: 700; line-height: 1.25; color: var(--rs-white); }
    .m1 h2 span { color: var(--rs-red); }
    .m1 .body {
      grid-column: 1;
      color: #c8ced6;
      font-size: 14.5px;
      line-height: 1.55;
      margin-top: 4px;
      white-space: pre-wrap;
    }
    .m1 .meta {
      grid-column: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .m1 .logo {
      grid-column: 2;
      grid-row: 2 / 4;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 0 2px #2a2f36, 0 0 18px var(--rs-red-glow);
      align-self: start;
    }
    .m1 .foot {
      grid-column: 1 / -1;
      border-top: 1px solid #232830;
      margin-top: 14px;
      padding-top: 10px;
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--rs-steel-dim);
      letter-spacing: 0.04em;
    }

    .m2 {
      width: 720px;
      height: 320px;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(ellipse 80% 70% at 50% 20%, rgba(225,6,0,0.28), transparent 55%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(140,150,165,0.12), transparent 50%),
        linear-gradient(180deg, #12151a 0%, #08090b 100%);
      border: 1px solid #2c3138;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(197,204,212,0.06);
    }
    .m2 .frame {
      position: absolute; inset: 10px;
      border: 1px solid rgba(197,204,212,0.18);
      border-radius: 10px; pointer-events: none;
    }
    .m2 .frame::before, .m2 .frame::after {
      content: ""; position: absolute; width: 28px; height: 28px;
      border: 2px solid var(--rs-red);
    }
    .m2 .frame::before { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
    .m2 .frame::after { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }
    .m2-inner {
      height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 24px 32px; position: relative; z-index: 1;
    }
    .m2 .logo {
      width: 92px; height: 92px; border-radius: 50%; object-fit: cover; margin-bottom: 14px;
      box-shadow: 0 0 0 3px rgba(197,204,212,0.25), 0 0 28px var(--rs-red-glow);
    }
    .m2 .kicker {
      font-size: 11px; letter-spacing: 0.35em; color: var(--rs-steel);
      text-transform: uppercase; margin-bottom: 8px;
    }
    .m2 h2 {
      font-size: 42px; font-weight: 800; letter-spacing: 0.04em;
      text-transform: uppercase; line-height: 1;
      text-shadow: 0 0 40px var(--rs-red-glow);
    }
    .m2 h2 em { font-style: normal; color: var(--rs-red); }
    .m2 .sub {
      margin-top: 12px; font-size: 14px; color: var(--rs-steel-dim); letter-spacing: 0.08em;
    }
    .m2 .bar {
      margin-top: 18px; display: flex; gap: 10px; align-items: center;
      flex-wrap: wrap; justify-content: center;
    }
    .m2 .bar span {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
      padding: 7px 12px; border-radius: 4px;
      background: rgba(225,6,0,0.15); border: 1px solid rgba(225,6,0,0.45); color: #ff8a84;
    }
    .m2 .bar span.steel {
      background: rgba(197,204,212,0.08); border-color: rgba(197,204,212,0.28); color: var(--rs-steel);
    }
    .m2 .pulse {
      position: absolute; left: 0; right: 0; bottom: 0; height: 3px;
      background: linear-gradient(90deg, transparent, var(--rs-red), transparent);
    }

    .m3 {
      width: 420px; height: 620px; border-radius: 12px; position: relative; overflow: hidden;
      background:
        linear-gradient(180deg, rgba(10,10,10,0.2) 0%, rgba(10,10,10,0.85) 55%, #050505 100%),
        radial-gradient(circle at 50% 28%, rgba(225,6,0,0.35), transparent 50%),
        #0b0c0e;
      border: 1px solid #333940;
      box-shadow: 0 20px 50px rgba(0,0,0,0.65);
      display: flex; flex-direction: column; align-items: center;
      padding: 36px 28px 28px; text-align: center;
    }
    .m3 .steel-ring {
      position: absolute; top: 48px; width: 210px; height: 210px; border-radius: 50%;
      border: 1px solid rgba(197,204,212,0.22);
      box-shadow: 0 0 40px rgba(225,6,0,0.2), inset 0 0 30px rgba(0,0,0,0.5);
    }
    .m3 .logo {
      width: 168px; height: 168px; border-radius: 50%; object-fit: cover;
      position: relative; z-index: 1; margin-top: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .m3 .tag {
      margin-top: 28px; font-size: 11px; letter-spacing: 0.4em;
      color: var(--rs-steel); text-transform: uppercase;
    }
    .m3 h2 {
      margin-top: 10px; font-size: 34px; font-weight: 800; line-height: 1.05;
      letter-spacing: 0.02em; text-transform: uppercase;
    }
    .m3 h2 .red { color: var(--rs-red); display: block; font-size: 40px; }
    .m3 .rule {
      width: 72%; height: 2px; margin: 18px auto;
      background: linear-gradient(90deg, transparent, var(--rs-red), var(--rs-steel), var(--rs-red), transparent);
    }
    .m3 .copy { font-size: 14px; color: #b7bec7; line-height: 1.55; max-width: 300px; white-space: pre-wrap; }
    .m3 .footer-block {
      margin-top: auto; width: 100%; padding-top: 18px;
      border-top: 1px solid rgba(197,204,212,0.15);
    }
    .m3 .footer-block strong {
      display: block; font-size: 13px; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--rs-white); margin-bottom: 6px;
    }
    .m3 .footer-block span { font-size: 12px; color: var(--rs-steel-dim); letter-spacing: 0.06em; }
    .m3 .rs4l {
      margin-top: 14px; font-size: 12px; letter-spacing: 0.35em;
      color: var(--rs-red); font-weight: 700;
    }

    .m4 {
      width: 720px; background: var(--rs-card-2); border-radius: 12px;
      border: 1px solid var(--rs-border); overflow: hidden;
      box-shadow: 0 14px 40px rgba(0,0,0,0.55);
    }
    .m4-top {
      display: flex; align-items: center; gap: 14px; padding: 16px 18px;
      background: linear-gradient(90deg, rgba(225,6,0,0.18), transparent 55%), #14181e;
      border-bottom: 1px solid #2a3038;
    }
    .m4-top .logo {
      width: 52px; height: 52px; border-radius: 50%; object-fit: cover;
      box-shadow: 0 0 0 2px rgba(197,204,212,0.25);
    }
    .m4-top .titles { flex: 1; }
    .m4-top .titles .small {
      font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--rs-steel-dim);
    }
    .m4-top .titles h2 { font-size: 20px; font-weight: 700; margin-top: 2px; }
    .m4-top .status {
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 8px 12px; border-radius: 6px;
      background: rgba(225,6,0,0.18); border: 1px solid rgba(225,6,0,0.5); color: #ff7a73;
      white-space: nowrap;
    }
    .m4-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #2a3038; }
    .m4-grid .cell { background: #151920; padding: 16px 18px; }
    .m4-grid .cell .k {
      font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--rs-steel-dim); margin-bottom: 6px;
    }
    .m4-grid .cell .v { font-size: 15px; font-weight: 600; color: var(--rs-white); }
    .m4-grid .cell .v.red { color: #ff6b63; }
    .m4-bottom {
      padding: 14px 18px; display: flex; gap: 8px; flex-wrap: wrap;
      align-items: center; background: #10141a;
    }
    .m4-bottom .note { margin-left: auto; font-size: 11px; color: var(--rs-steel-dim); }

    .m5 {
      width: 720px; height: 280px; border-radius: 14px; position: relative; overflow: hidden;
      background: #050607; border: 1px solid #2a2f36;
      box-shadow: 0 16px 48px rgba(0,0,0,0.65);
    }
    .m5 .bg-logo {
      position: absolute; right: -40px; top: 50%; transform: translateY(-50%);
      width: 340px; height: 340px; border-radius: 50%; object-fit: cover; opacity: 0.18;
      filter: grayscale(0.15) contrast(1.1);
      mask-image: radial-gradient(circle, black 40%, transparent 72%);
      -webkit-mask-image: radial-gradient(circle, black 40%, transparent 72%);
    }
    .m5 .vignette {
      position: absolute; inset: 0;
      background:
        linear-gradient(90deg, #050607 18%, rgba(5,6,7,0.82) 48%, rgba(5,6,7,0.35) 100%),
        radial-gradient(ellipse at 20% 50%, rgba(225,6,0,0.18), transparent 55%);
      pointer-events: none;
    }
    .m5 .content {
      position: relative; z-index: 2; height: 100%; padding: 28px 32px;
      display: flex; flex-direction: column; justify-content: center; max-width: 420px;
    }
    .m5 .badge {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--rs-steel); margin-bottom: 14px;
    }
    .m5 .badge i {
      width: 8px; height: 8px; border-radius: 50%; background: var(--rs-red);
      box-shadow: 0 0 10px var(--rs-red); display: inline-block;
    }
    .m5 h2 { font-size: 32px; font-weight: 800; line-height: 1.1; }
    .m5 h2 span { color: var(--rs-red); }
    .m5 p { margin-top: 12px; font-size: 14px; line-height: 1.5; color: #aeb6c0; white-space: pre-wrap; }
    .m5 .cta-row { margin-top: 18px; display: flex; align-items: center; gap: 12px; }
    .m5 .cta {
      font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 10px 14px; background: linear-gradient(180deg, #e10600, #9b0b0b);
      border-radius: 6px; color: white; box-shadow: 0 6px 18px rgba(225,6,0,0.35);
    }
    .m5 .cta-sub { font-size: 12px; color: var(--rs-steel-dim); }
    .m5 .ecg {
      position: absolute; left: 32px; right: 32px; bottom: 18px; height: 18px; opacity: 0.55;
      background: linear-gradient(90deg,
        transparent 0%, var(--rs-red) 8%, transparent 10%,
        transparent 18%, var(--rs-red) 22%, transparent 24%,
        transparent 40%, #c5ccd4 48%, transparent 52%,
        transparent 70%, var(--rs-red) 78%, transparent 82%);
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.jpg" alt="RS" />
    <div>
      <h1>RS Visual Editor</h1>
      <p>Text only · same designs as the mockups</p>
    </div>
    <div class="spacer"></div>
    <div class="hint">Edit fields on the left. Preview updates live. Download PNG when ready.</div>
  </header>

  <div class="layout">
    <aside>
      <div class="tabs" id="tabs"></div>
      <div id="fields"></div>
      <div class="actions">
        <button type="button" class="btn-primary" id="btnDownload">Download PNG</button>
        <button type="button" class="btn-secondary" id="btnReset">Reset text</button>
      </div>
      <p class="note">
        Opens offline in Edge/Chrome. No login. Text only for now — more tools later if needed.
      </p>
    </aside>
    <main>
      <div class="preview-label">Preview · pinch-scroll if needed</div>
      <div class="preview-wrap">
        <div id="exportRoot"></div>
      </div>
    </main>
  </div>

  <div class="sticky-actions" id="stickyActions">
    <button type="button" class="btn-secondary" id="btnShareMobile" style="background:#1e232b;color:#c5ccd4;border:1px solid #2a3038;">Save / Share</button>
    <button type="button" class="btn-primary" id="btnDownloadMobile" style="background:linear-gradient(180deg,#e10600,#9b0b0b);color:#fff;">PNG</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    const LOGO = "logo.jpg";

    const TEMPLATES = {
      hero: {
        label: "Hero",
        defaults: {
          kicker: "Rhythm Syndicate presents",
          line1: "Week 1",
          line2: "Open",
          sub: "Season 1 · Teams of 2 · Four-week grind",
          chip1: "Now Live",
          chip2: "Closes Fri 11:59 PM PST",
          chip3: "3 Divisions",
        },
        fields: [
          { key: "kicker", label: "Kicker (top line)" },
          { key: "line1", label: "Title (white)" },
          { key: "line2", label: "Title accent (red)" },
          { key: "sub", label: "Subtitle" },
          { key: "chip1", label: "Chip 1 (hot)" },
          { key: "chip2", label: "Chip 2" },
          { key: "chip3", label: "Chip 3" },
        ],
        render(d) {
          return `
            <div class="m2" id="cardNode">
              <div class="frame"></div>
              <div class="m2-inner">
                <img class="logo" src="${LOGO}" alt="RS" />
                <div class="kicker"></div>
                <h2><span class="l1"></span> <em class="l2"></em></h2>
                <div class="sub"></div>
                <div class="bar">
                  <span class="c1"></span>
                  <span class="steel c2"></span>
                  <span class="steel c3"></span>
                </div>
              </div>
              <div class="pulse"></div>
            </div>`;
        },
        fill(root, d) {
          root.querySelector(".kicker").textContent = d.kicker;
          root.querySelector(".l1").textContent = d.line1;
          root.querySelector(".l2").textContent = d.line2;
          root.querySelector(".sub").textContent = d.sub;
          root.querySelector(".c1").textContent = d.chip1;
          root.querySelector(".c2").textContent = d.chip2;
          root.querySelector(".c3").textContent = d.chip3;
        },
      },
      ops: {
        label: "Ops strip",
        defaults: {
          season: "Rhythm Syndicate · Season 1",
          title: "Week 2 scoring window",
          status: "● Open",
          opens: "Sat 10:00 AM PST",
          closes: "Fri 11:59 PM PST",
          song: "Paranoid — Black Sabbath",
          note: "Staff: /rs · Players: /tourney",
        },
        fields: [
          { key: "season", label: "Header small" },
          { key: "title", label: "Title" },
          { key: "status", label: "Status pill" },
          { key: "opens", label: "Opens" },
          { key: "closes", label: "Closes" },
          { key: "song", label: "Song" },
          { key: "note", label: "Footer note" },
        ],
        render() {
          return `
            <div class="m4" id="cardNode">

                <div class="cell"><div class="k">Closes</div><div class="v red v-closes"></div></div>
                <div class="cell"><div class="k">Song</div><div class="v v-song"></div></div>
              </div>
              <div class="m4-bottom">

                <span class="chip">Fusion</span>

        },
        fill(root, d) {
          root.querySelector(".small").textContent = d.season;
          root.querySelector("h2").textContent = d.title;
          root.querySelector(".status").textContent = d.status;
          root.querySelector(".v-opens").textContent = d.opens;
          root.querySelector(".v-closes").textContent = d.closes;
          root.querySelector(".v-song").textContent = d.song;
          root.querySelector(".note").textContent = d.note;
        },
      },
      embed: {
        label: "Embed",
        defaults: {
          eyebrow: "Rhythm Syndicate · Official",
          title: "Season 1 is",
          accent: "LIVE",
          body: "Week 1 scoring is open. Pair up, pick your division, and put points on the board.\nCaptains — check your team channel and lock your song plan.",
          chip1: "Week 1 Open",
          chip2: "Sat 10:00 AM PST",
          chip3: "Classic · Fusion · Arcade",
          footL: "RS TOURNEY BOT · ANNOUNCEMENT",
          footR: "RS4L",
        },
        fields: [
          { key: "eyebrow", label: "Eyebrow" },
          { key: "title", label: "Title" },
          { key: "accent", label: "Title red word" },
          { key: "body", label: "Body", multiline: true },
          { key: "chip1", label: "Chip 1 (hot)" },
          { key: "chip2", label: "Chip 2" },
          { key: "chip3", label: "Chip 3" },
          { key: "footL", label: "Footer left" },
          { key: "footR", label: "Footer right" },
        ],
        render() {
          return `
            <div class="m1" id="cardNode">
              <div class="eyebrow"></div>
              <div>
                <h2><span class="t"></span> <span class="a"></span></h2>
                <p class="body"></p>
                <div class="meta">
                  <span class="chip hot c1"></span>
                  <span class="chip c2"></span>
                  <span class="chip c3"></span>
                </div>
              </div>
              <img class="logo" src="${LOGO}" alt="RS" />
              <div class="foot"><span class="fl"></span><span class="fr"></span></div>
            </div>`;
        },
        fill(root, d) {
          root.querySelector(".eyebrow").textContent = d.eyebrow;
          root.querySelector(".t").textContent = d.title;
          root.querySelector(".a").textContent = d.accent;
          root.querySelector(".body").textContent = d.body;
          root.querySelector(".c1").textContent = d.chip1;
          root.querySelector(".c2").textContent = d.chip2;
          root.querySelector(".c3").textContent = d.chip3;
          root.querySelector(".fl").textContent = d.footL;
          root.querySelector(".fr").textContent = d.footR;
        },
      },
      poster: {
        label: "Poster",
        defaults: {
          tag: "Season One",
          line1: "The beat",
          line2: "Drops",
          copy: "Official tournament announcement for Laura’s server.\nRegistration via Sesh — admins import teams after close.",
          footerStrong: "Saturday · 10:00 AM PST",
          footerSpan: "Classic · Fusion · Arcade",
        },
        fields: [
          { key: "tag", label: "Tag" },
          { key: "line1", label: "Headline line 1" },
          { key: "line2", label: "Headline red line" },
          { key: "copy", label: "Copy", multiline: true },
          { key: "footerStrong", label: "Footer bold" },
          { key: "footerSpan", label: "Footer small" },
        ],
        render() {
          return `
            <div class="m3" id="cardNode">
              <div class="steel-ring"></div>
              <img class="logo" src="${LOGO}" alt="RS" />
              <div class="tag"></div>
              <h2><span class="l1"></span><span class="red l2"></span></h2>
              <div class="rule"></div>
              <p class="copy"></p>
              <div class="footer-block">
                <strong></strong>
                <span class="fs"></span>
                <div class="rs4l">RS4L</div>
              </div>
            </div>`;
        },
        fill(root, d) {
          root.querySelector(".tag").textContent = d.tag;
          root.querySelector(".l1").textContent = d.line1;
          root.querySelector(".l2").textContent = d.line2;
          root.querySelector(".copy").textContent = d.copy;
          root.querySelector("strong").textContent = d.footerStrong;
          root.querySelector(".fs").textContent = d.footerSpan;
        },
      },
      cinematic: {
        label: "Cinematic",
        defaults: {
          badge: "Official Announcement",
          headline: "Captain’s Burden",
          accent: "Week 4",
          body: "Final stretch. Captain score + Teammate × 2. Leave nothing on the kit.",
          cta: "Standings live",
          ctaSub: "RS · Season 1 finale window",
        },
        fields: [
          { key: "badge", label: "Badge" },
          { key: "headline", label: "Headline" },
          { key: "accent", label: "Accent (red)" },
          { key: "body", label: "Body", multiline: true },
          { key: "cta", label: "CTA button" },
          { key: "ctaSub", label: "CTA subtext" },
        ],
        render() {
          return `
            <div class="m5" id="cardNode">
              <img class="bg-logo" src="${LOGO}" alt="" />
              <div class="vignette"></div>
              <div class="content">
                <div class="badge"><i></i> <span class="badge-t"></span></div>
                <h2><span class="h"></span><br /><span class="a"></span></h2>
                <p class="p"></p>
                <div class="cta-row">
                  <div class="cta"></div>
                  <div class="cta-sub"></div>

        },
        fill(root, d) {
          root.querySelector(".badge-t").textContent = d.badge;
          root.querySelector(".h").textContent = d.headline;
          root.querySelector(".a").textContent = d.accent;
          root.querySelector(".p").textContent = d.body;
          root.querySelector(".cta").textContent = d.cta;
          root.querySelector(".cta-sub").textContent = d.ctaSub;
        },
      },
    };

    let current = "hero";
    let data = {};

    function loadDefaults(id) {
      data[id] = { ...TEMPLATES[id].defaults };
    }

    function renderTabs() {
      const tabs = document.getElementById("tabs");
      tabs.innerHTML = "";
      for (const [id, t] of Object.entries(TEMPLATES)) {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = t.label;
        b.className = id === current ? "active" : "";
        b.onclick = () => {
          current = id;
          if (!data[id]) loadDefaults(id);
          renderTabs();
          renderFields();
          renderPreview();
        };
        tabs.appendChild(b);
      }
    }

    function renderFields() {
      const t = TEMPLATES[current];
      const box = document.getElementById("fields");
      box.innerHTML = "";
      if (!data[current]) loadDefaults(current);
      for (const f of t.fields) {
        const lab = document.createElement("label");
        lab.className = "field";
        const span = document.createElement("span");
        span.textContent = f.label;
        lab.appendChild(span);
        let input;
        if (f.multiline) {
          input = document.createElement("textarea");
        } else {
          input = document.createElement("input");
          input.type = "text";
        }
        input.value = data[current][f.key] ?? "";
        input.addEventListener("input", () => {
          data[current][f.key] = input.value;
          fillPreview();
        });
        lab.appendChild(input);
        box.appendChild(lab);
      }
    }

    function renderPreview() {
      const t = TEMPLATES[current];
      const root = document.getElementById("exportRoot");
      root.innerHTML = t.render(data[current]);
      fillPreview();
      requestAnimationFrame(scalePreview);
      // re-scale after logo paints
      setTimeout(scalePreview, 50);
    }

    function fillPreview() {
      const t = TEMPLATES[current];
      const card = document.getElementById("cardNode");
      if (card) t.fill(card, data[current]);
    }

    function scalePreview() {
      const root = document.getElementById("exportRoot");
      const card = document.getElementById("cardNode");
      if (!root || !card) return;
      // Cards are fixed 720 (or 420 poster). Fit to viewport on phone.
      const pad = 24;
      const vw = Math.min(window.innerWidth, document.documentElement.clientWidth) - pad;
      const natural = card.offsetWidth || 720;
      const s = Math.min(1, vw / natural);
      root.style.transform = s < 0.999 ? `scale(${s})` : "";
      root.style.marginBottom = s < 0.999 ? `${(1 - s) * -card.offsetHeight}px` : "0";
      // Keep layout height roughly correct after scale
      if (s < 0.999) {
        root.style.height = `${card.offsetHeight * s}px`;
      } else {
        root.style.height = "";
      }
    }

    async function capturePng() {
      const card = document.getElementById("cardNode");
      if (!card || typeof html2canvas !== "function") {
        throw new Error("Export library failed to load. Need internet once for html2canvas, then retry.");
      }
      // Capture at full size: temporarily unscale
      const root = document.getElementById("exportRoot");
      const prev = root.style.transform;
      const prevH = root.style.height;
      root.style.transform = "";
      root.style.height = "";
      try {
        const canvas = await html2canvas(card, {
          backgroundColor: null,
          scale: Math.min(2, window.devicePixelRatio || 2),
          useCORS: true,
          allowTaint: true,
          logging: false,
        });
        return canvas;
      } finally {
        root.style.transform = prev;
        root.style.height = prevH;
      }
    }

    async function downloadPng(btn) {
      const label = btn.textContent;
      btn.disabled = true;
      btn.textContent = "Saving…";
      try {
        const canvas = await capturePng();
        const name = `rs-${current}-${Date.now()}.png`;
        // Prefer share sheet on phone (works better on iOS)
        if (navigator.canShare && navigator.share) {
          const blob = await new Promise((res) => canvas.toBlob(res, "image/png"));
          if (blob) {
            const file = new File([blob], name, { type: "image/png" });
            if (navigator.canShare({ files: [file] })) {
              await navigator.share({ files: [file], title: "RS card" });
              return;
            }
          }
        }
        const a = document.createElement("a");
        a.download = name;
        a.href = canvas.toDataURL("image/png");
        a.click();
      } catch (e) {
        console.error(e);
        alert("Could not export PNG: " + (e.message || e));
      } finally {
        btn.disabled = false;
        btn.textContent = label;
      }
    }

    document.getElementById("btnReset").onclick = () => {
      loadDefaults(current);
      renderFields();
      renderPreview();
    };

    document.getElementById("btnDownload").onclick = () =>
      downloadPng(document.getElementById("btnDownload"));
    document.getElementById("btnDownloadMobile").onclick = () =>
      downloadPng(document.getElementById("btnDownloadMobile"));
    document.getElementById("btnShareMobile").onclick = () =>
      downloadPng(document.getElementById("btnShareMobile"));

    window.addEventListener("resize", scalePreview);
    window.addEventListener("orientationchange", () => setTimeout(scalePreview, 200));

    // init
    loadDefaults("hero");
    renderTabs();
    renderFields();
    renderPreview();
  </script>
</body>
